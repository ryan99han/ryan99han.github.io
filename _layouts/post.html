---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
          <a href="{{ '/' | relative_url }}#{{ tag | slugify }}" class="tag">{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
